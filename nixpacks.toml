# Monorepo-safe Nixpacks config.
# Use SERVICE_TARGET=dashboard|api|worker|scheduler per deploy service.
# This avoids default autodetect commands like `go build ...` at /app.

[phases.setup]
nixPkgs = ["bash", "go", "nodejs"]

[phases.build]
cmds = ["bash ./scripts/nixpacks-build.sh"]

[start]
cmd = "bash ./scripts/nixpacks-start.sh"
