services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: jobsystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobsystem"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/jobsystem?sslmode=disable
      REDIS_ADDR: redis:6379
      ADMIN_TOKEN: dev-admin-token
      AUTO_MIGRATE: "true"
      HTTP_ADDR: :8080
      MIGRATIONS_DIR: /app/migrations
      DASHBOARD_ORIGIN: http://localhost:3000
      DEFAULT_DEDUPE_WINDOW: 15m
      POLICY_REFRESH_INTERVAL: 5s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler.Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/jobsystem?sslmode=disable
      REDIS_ADDR: redis:6379
      HTTP_ADDR: :8080
      DASHBOARD_ORIGIN: http://localhost:3000
      SCHEDULER_ID: scheduler-1
      SCHEDULER_LEADERSHIP_TTL: 15s
      DEFAULT_DEDUPE_WINDOW: 15m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8090:8080"

  scheduler-2:
    build:
      context: .
      dockerfile: docker/scheduler.Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/jobsystem?sslmode=disable
      REDIS_ADDR: redis:6379
      HTTP_ADDR: :8080
      DASHBOARD_ORIGIN: http://localhost:3000
      SCHEDULER_ID: scheduler-2
      SCHEDULER_LEADERSHIP_TTL: 15s
      DEFAULT_DEDUPE_WINDOW: 15m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8091:8080"

  worker-1:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/jobsystem?sslmode=disable
      REDIS_ADDR: redis:6379
      HTTP_ADDR: :8080
      WORKER_ID: worker-1
      WORKER_QUEUES: critical,default,low
      WORKER_CONCURRENCY: 32
      POLICY_REFRESH_INTERVAL: 5s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8080"

  worker-2:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/jobsystem?sslmode=disable
      REDIS_ADDR: redis:6379
      HTTP_ADDR: :8080
      WORKER_ID: worker-2
      WORKER_QUEUES: critical,default,low
      WORKER_CONCURRENCY: 32
      POLICY_REFRESH_INTERVAL: 5s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8082:8080"

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_ADMIN_TOKEN: dev-admin-token
    depends_on:
      - api
    ports:
      - "3000:80"

  prometheus:
    image: prom/prometheus:v3.5.0
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
      - scheduler
      - scheduler-2
      - worker-1
      - worker-2

volumes:
  postgres-data:
  redis-data:
